                { dia: 14, pasaje: "Colosenses 3:15-17", foco: "Que la paz del Mesías gobierne como árbitro en tus decisiones." }
            ]
        };

        const TEXTOS_AYUDA = {
            global: { titulo: "¿Qué es la Senda Antigua?", contenido: "Es un retiro digital de 14 días fundamentado en Jeremías 6:16. Diseñado para que detengas el ritmo desenfrenado del mundo, evalúes con mansedumbre el cansancio de tu cuerpo y de tu alma, desarmes las mentiras del legalismo y cultives el Fruto del Espíritu mediante hábitos diarios y realistas." },
            fase1: { titulo: "Fase 1: Detenerse (Amad)", contenido: "En la tradición bíblica, 'Amad' significa pararse con firmeza, interrumpir la marcha inercial. Es un acto de coraje: examinar nuestro templo y nuestra mente para admitir con amor que no somos autosuficientes." },
            resync: { titulo: "Sincronía Sagrada (RE-SYNC)", contenido: "Consiste en un minuto de absoluto silencio espiritual. Un alto físico obligatorio que somete el cuerpo y la mente, declarando que el control de la vida le pertenece a Dios y que el mundo seguirá en marcha aunque tú te detengas a respirar." },
            fase2: { titulo: "Fase 2: Volver en sí (Ra'ah)", contenido: "No es un simple desahogo emocional. 'Volver en sí' es el despertar del alma que reconoce que ha intentado gobernarse a sí misma. El arrepentimiento real ante Dios no es solo admitir el error, sino un giro de 180 grados: renunciar a nuestra autosuficiencia y correr desesperadamente a los brazos de la persona de Jesús, sabiendo que solo por Su gracia podemos ser transformados." },
            fase3: { titulo: "Fase 3: Preguntar (Netibot)", contenido: "Búsqueda de las veredas eternas de la gracia de Dios. Desarmamos las mentiras condenatorias de la carne aplicando la verdad reconciliadora de Jesús." },
            fase4: { titulo: "Fase 4: El Caminar (Halak)", contenido: "Dar pasos concretos y estables. Implica adoptar disciplinas ligeras y realistas (Protos) que nos ayuden a permanecer anclados a Jesús, la Vid verdadera." },
            yadah: { titulo: "Altar de Gratitud (Yadah)", contenido: "En hebreo, 'Yadah' significa alabar levantando las manos en confesión de quién es Dios. Al dar gracias, tu cerebro abandona el estado de alerta por escasez y entra en la realidad de la provisión y el amor incondicional del Padre." }
        };

        function obtenerPerfilBase(nombre) {
            return {
                nombre: nombre,
                faseActual: 'bienvenida',
                indicePregunta: 0,
                respuestasTest: {},
                resultadoCarga: 0, 
                veredicto: '', 
                tipoRuta: '',  
                historicoRuta: null,
                alertaTormentaActiva: null,
                obrasSeleccionadas: [],
                diaActual: 1,
                registroDias: { 1: null, 2: null, 3: null, 4: null, 5: null, 6: null, 7: null, 8: null, 9: null, 10: null, 11: null, 12: null, 13: null, 14: null },
                registroGratitud: {},
                sintomasCriticos: [],
                sintomasCicloAnterior: [],
                victorias: [],
                historicoFisiologico: { deshidratado: false, insomnio: false, pantallas: false },
                conteoCronicidad: {} 
            };
        }

        const SendaEstado = {
            perfiles: {},
            perfilActivo: '',
            datos: {},
            timerInterval: null,
            segundosRestantes: 0,

            inicializar() {
                const perfilesGuardados = localStorage.getItem('senda_antigua_perfiles');
                const activoGuardado = localStorage.getItem('senda_antigua_perfil_activo');

                if (perfilesGuardados) {
                    try {
                        this.perfiles = JSON.parse(perfilesGuardados);
                        this.perfilActivo = activoGuardado || '';
                    } catch (e) {
                        this.crearPerfilPorDefecto();
                    }
                }

                if (this.perfilActivo && !this.perfiles[this.perfilActivo]) {
                    this.perfilActivo = '';
                }

                this.configurarDOMGlobal();
                this.actualizarSelectorUI();
                this.irAPantallaEntradaBienvenida();
            },

            crearPerfilPorDefecto() {
                this.perfiles = {};
                this.perfilActivo = '';
                this.guardarTodo();
            },

            guardarTodo() {
                localStorage.setItem('senda_antigua_perfiles', JSON.stringify(this.perfiles));
                localStorage.setItem('senda_antigua_perfil_activo', this.perfilActivo);
            },

            limpiarHilosYConsola() {
                if (this.timerInterval) {
                    clearInterval(this.timerInterval);
                    this.timerInterval = null;
                }
                
                window.scrollTo({ top: 0, behavior: 'smooth' });

                const viewport = document.getElementById('app-viewport');
                if (viewport) {
                    viewport.className = "w-full max-w-xl bg-white rounded-[2.5rem] p-6 md:p-10 shadow-sm border border-stone-100/80 relative";
                }
            },

            clickEnLogo() {
                if (this.datos && this.datos.faseActual === 'sendero_dashboard') {
                    this.irAFase('sendero_dashboard');
                } else if (Object.keys(this.perfiles).length > 0) {
                    this.irAPantallaEntradaBienvenida();
                } else {
                    this.irAFaseCreacionPerfil();
                }
            },

            irAPantallaEntradaBienvenida() {
                this.limpiarHilosYConsola();
                this.perfilActivo = '';
                this.datos = {};
                this.guardarTodo();
                this.actualizarSelectorUI();
                
                const progHeader = document.getElementById('progreso-header');
                if (progHeader) progHeader.innerText = "La Senda Antigua";
                
                const viewport = document.getElementById('app-viewport');
                if (viewport) viewport.innerHTML = VistaEntradaBienvenidaNeutral();
            },

            cargarPerfil(nombre) {
                if (!nombre || nombre.trim() === "") return;
                
                if (this.perfilActivo) {
                    this.guardar();
                }

                this.limpiarHilosYConsola();
                
                this.perfilActivo = nombre;
                if (!this.perfiles[nombre]) {
                    this.perfiles[nombre] = obtenerPerfilBase(nombre);
                }
                this.datos = this.perfiles[nombre];
                
                if (this.datos.indicePregunta === undefined) this.datos.indicePregunta = 0;
                if (!this.datos.respuestasTest) this.datos.respuestasTest = {};
                if (this.datos.diaActual === undefined) this.datos.diaActual = 1;
                if (!this.datos.sintomasCriticos) this.datos.sintomasCriticos = [];
                if (!this.datos.sintomasCicloAnterior) this.datos.sintomasCicloAnterior = [];
                if (!this.datos.victorias) this.datos.victorias = [];
                if (!this.datos.conteoCronicidad) this.datos.conteoCronicidad = {};
                if (!this.datos.historicoFisiologico) this.datos.historicoFisiologico = { deshidratado: false, insomnio: false, pantallas: false };

                this.guardarTodo();
                this.actualizarSelectorUI();
                this.renderizarFaseActual();
            },

            guardar() {
                if (this.perfilActivo) {
                    this.perfiles[this.perfilActivo] = this.datos;
                    this.guardarTodo();
                }
            },

            irAFaseCreacionPerfil() {
                this.limpiarHilosYConsola();
                const viewport = document.getElementById('app-viewport');
                const progHeader = document.getElementById('progreso-header');
                if (progHeader) progHeader.innerText = "Nuevo Comienzo";
                if (viewport) viewport.innerHTML = VistaCrearPerfilInicial();
            },

            irAFase(nuevaFase) {
                this.limpiarHilosYConsola();

                const viewport = document.getElementById('app-viewport');
                if (viewport) {
                    viewport.classList.remove('fade-in');
                    void viewport.offsetWidth; 
                    viewport.classList.add('fade-in');
                }

                this.datos.faseActual = nuevaFase;
                this.guardar();
                this.renderizarFaseActual();
            },

            reiniciarCamino() {
                if (confirm(`¿Deseas reiniciar la estación? Se guardará tu historial de progreso y victorias en Cristo.`)) {
                    this.limpiarHilosYConsola();
                    const historico = this.datos.tipoRuta;
                    const victoriasPrevias = this.datos.victorias || [];
                    const sintomasPasados = this.datos.sintomasCriticos || [];
                    const cronicidadPrevia = this.datos.conteoCronicidad || {};

                    this.perfiles[this.perfilActivo] = obtenerPerfilBase(this.perfilActivo);
                    this.perfiles[this.perfilActivo].historicoRuta = historico;
                    this.perfiles[this.perfilActivo].victorias = victoriasPrevias;
                    this.perfiles[this.perfilActivo].sintomasCicloAnterior = sintomasPasados;
                    this.perfiles[this.perfilActivo].conteoCronicidad = cronicidadPrevia;
                    
                    this.datos = this.perfiles[this.perfilActivo];
                    this.guardar();
                    this.renderizarFaseActual();
                }
            },

            configurarDOMGlobal() {
                const logo = document.getElementById('logo-senda');
                if (logo) {
                    logo.onclick = (e) => {
                        e.preventDefault();
                        this.clickEnLogo();
                    };
                }

                const selector = document.getElementById('selector-perfiles');
                if (selector) {
                    selector.onchange = (e) => {
                        if (e.target.value === "") {
                            this.irAPantallaEntradaBienvenida();
                        } else {
                            this.cargarPerfil(e.target.value);
                        }
                    };
                }

                const btnNuevo = document.getElementById('btn-nuevo-perfil');
                if (btnNuevo) {
                    btnNuevo.onclick = () => {
                        const nombre = prompt("Ingresa el nombre de pila para este perfil familiar (ej. Mateo):");
                        if (nombre && nombre.trim() !== "") {
                            const limpio = textClean(nombre);
                            if (this.perfiles[limpio]) {
                                alert("Ya existe un espacio con ese nombre.");
                                return;
                            }
                            this.perfiles[limpio] = obtenerPerfilBase(limpio);
                            this.guardarTodo();
                            this.cargarPerfil(limpio);
                        }
                    };
                }
            },

            actualizarSelectorUI() {
                const selector = document.getElementById('selector-perfiles');
                if (!selector) return;
                
                if (Object.keys(this.perfiles).length === 0) {
                    selector.innerHTML = `<option value="">Sin perfiles</option>`;
                    return;
                }

                const opciones = Object.keys(this.perfiles).map(p => `
                    <option value="${p}" ${p === this.perfilActivo ? 'selected' : ''}>${p}</option>
                `).join('');

                selector.innerHTML = `<option value="" ${this.perfilActivo === '' ? 'selected' : ''}>-- Seleccionar perfil --</option>` + opciones;
            },

            renderizarFaseActual() {
                const viewport = document.getElementById('app-viewport');
                const progHeader = document.getElementById('progreso-header');

                if (!viewport) return;

                if (!this.perfilActivo) {
                    this.irAPantallaEntradaBienvenida();
                    return;
                }

                if (!this.datos.faseActual) {
                    this.datos.faseActual = 'bienvenida';
                }

                if (progHeader) {
                    switch (this.datos.faseActual) {
                        case 'bienvenida': progHeader.innerText = "El Llamado"; break;
                        case 'filtro_templo': progHeader.innerText = "Mantenimiento del Templo"; break;
                        case 'amad_test': progHeader.innerText = "Fase 1: Detenerse"; break;
                        case 'tormenta_pastoral': progHeader.innerText = "La Mirada del Pastor"; break;
                        case 'resync_timer': progHeader.innerText = "Fase 1: Silencio"; break;
                        case 'raah_confesion': progHeader.innerText = "Fase 2: Volver en sí"; break;
                        case 'netibot_gracia': progHeader.innerText = "Fase 3: Preguntar"; break;
                        case 'halak_obras': progHeader.innerText = "Fase 4: El Caminar"; break;
                        case 'sendero_dashboard': progHeader.innerText = `Día ${this.datos.diaActual} — Estación`; break;
                        case 'checkpoint_evaluacion': progHeader.innerText = "Estación Completada"; break;
                        default: progHeader.innerText = "";
                    }
                }

                switch (this.datos.faseActual) {
                    case 'bienvenida': viewport.innerHTML = VistaBienvenida(); break;
                    case 'filtro_templo': viewport.innerHTML = VistaFiltroTemplo(); break;
                    case 'amad_test': viewport.innerHTML = VistaAmadTest(); break;
                    case 'tormenta_pastoral': viewport.innerHTML = VistaTormentaPastoral(); break;
                    case 'resync_timer': viewport.innerHTML = VistaResyncTimer(); iniciarReloj(); break;
                    case 'raah_confesion': viewport.innerHTML = VistaRaahConfesion(); break;
                    case 'netibot_gracia': viewport.innerHTML = VistaNetibotGracia(); break;
                    case 'halak_obras': viewport.innerHTML = VistaHalakObras(); break;
                    case 'sendero_dashboard': viewport.innerHTML = VistaSenderoDashboard(); break;
                    case 'checkpoint_evaluacion': viewport.innerHTML = VistaCheckpointEvaluacion(); break;
                }
            }
        };

        function textClean(text) {
            return text.replace(/<[^>]*>/g, '').trim();
        }

        function registrarPerfilInicial() {
            const input = document.getElementById('nombre-inicial');
            if (input && input.value.trim() !== "") {
                const nombre = textClean(input.value);
                SendaEstado.perfiles[nombre] = obtenerPerfilBase(nombre);
                SendaEstado.perfilActivo = nombre;
                SendaEstado.datos = SendaEstado.perfiles[nombre];
                SendaEstado.guardarTodo();
                SendaEstado.actualizarSelectorUI();
                SendaEstado.irAFase('bienvenida');
            } else {
                alert("Por favor, ingresa un nombre para comenzar.");
            }
        }

            return `

        function responderPregunta(valor) {
            const index = SendaEstado.datos.indicePregunta || 0;
            const pre = PREGUNTAS_TEST[index];
            SendaEstado.datos.respuestasTest[pre.id] = valor;
            if (index + 1 < PREGUNTAS_TEST.length) {
                SendaEstado.datos.indicePregunta++;
                SendaEstado.guardar();
                SendaEstado.renderizarFaseActual();
            } else {
                procesarDiagnostico();
            }
        }

        function retrocederPregunta() {
            if (SendaEstado.datos.indicePregunta > 0) {
                SendaEstado.datos.indicePregunta--;
                SendaEstado.guardar();
                SendaEstado.renderizarFaseActual();
            }
        }

        function procesarDiagnostico() {
            let total = 0;
            const sintomasCriticosNuevos = [];
            SendaEstado.datos.sintomasCicloAnterior = SendaEstado.datos.sintomasCriticos || [];
            const sintomasAnterioresIds = SendaEstado.datos.sintomasCicloAnterior.map(s => s.id);
            
            if (!SendaEstado.datos.conteoCronicidad) SendaEstado.datos.conteoCronicidad = {};
            if (!SendaEstado.datos.victorias) SendaEstado.datos.victorias = [];

            for (let k in SendaEstado.datos.respuestasTest) {
                const valor = SendaEstado.datos.respuestasTest[k];
                total += valor;

                if (valor >= 3 && MEDICINA_TEOLOGICA[k]) {
                    const esPersistente = sintomasAnterioresIds.includes(k);
                    if (!SendaEstado.datos.conteoCronicidad[k]) SendaEstado.datos.conteoCronicidad[k] = 0;
                    SendaEstado.datos.conteoCronicidad[k]++;
                    sintomasCriticosNuevos.push({
                        id: k,
                        puntuacion: valor,
                        persistente: esPersistente,
                        consecutivos: SendaEstado.datos.conteoCronicidad[k],
                        ...MEDICINA_TEOLOGICA[k]
                    });
                } else if (valor < 3 && MEDICINA_TEOLOGICA[k]) {
                    const indexPasado = sintomasAnterioresIds.indexOf(k);
                    if (indexPasado !== -1) {
                        SendaEstado.datos.victorias.push({ id: k, raiz: MEDICINA_TEOLOGICA[k].raiz, fecha: new Date().toLocaleDateString() });
                    }
                    SendaEstado.datos.conteoCronicidad[k] = 0;
                }
            }

            SendaEstado.datos.resultadoCarga = total;
            SendaEstado.datos.sintomasCriticos = sintomasCriticosNuevos;
            const antiguoTipo = SendaEstado.datos.tipoRuta; 
            let nuevoTipo = 'stable';

            if (total >= 38) { SendaEstado.datos.veredicto = "Yugo del Mundo (Cansancio Severo)"; nuevoTipo = "severo"; } 
            else if (total >= 22) { SendaEstado.datos.veredicto = "Carga Desequilibrada (Límite de Alerta)"; nuevoTipo = "alerta"; } 
            else { SendaEstado.datos.veredicto = "Senda Estable (Busca Constancia)"; nuevoTipo = "stable"; }

            SendaEstado.datos.tipoRuta = nuevoTipo;
            SendaEstado.datos.indicePregunta = 0;
            SendaEstado.datos.alertaTormentaActiva = null;

            if (antiguoTipo) {
                const jerarquia = { 'stable': 1, 'alerta': 2, 'severo': 3 };
                if (jerarquia[nuevoTipo] > jerarquia[antiguoTipo]) {
                    const alertasPosibles = ['arena', 'espinas', 'autosuficiencia'];
                    SendaEstado.datos.alertaTormentaActiva = alertasPosibles[Math.floor(Math.random() * alertasPosibles.length)];
                }
            }

            SendaEstado.datos.historicoRuta = antiguoTipo; 
            SendaEstado.guardar();

            if (SendaEstado.datos.alertaTormentaActiva) SendaEstado.irAFase('tormenta_pastoral');
            else SendaEstado.irAFase('resync_timer');
        }

        function iniciarReloj() {
            if (SendaEstado.timerInterval) { clearInterval(SendaEstado.timerInterval); SendaEstado.timerInterval = null; }
            SendaEstado.segundosRestantes = 60;
            const totalDash = 414.6;
            const circulo = document.getElementById('timer-circle');
            const relojTexto = document.getElementById('reloj-texto');
            const btn = document.getElementById('btn-completar-timer');

            if (!circulo || !relojTexto) return;
            SendaEstado.timerInterval = setInterval(() => {
                SendaEstado.segundosRestantes--;
                if (relojTexto) relojTexto.innerText = SendaEstado.segundosRestantes;
                if (circulo) {
                    const offset = totalDash - (totalDash * (60 - SendaEstado.segundosRestantes) / 60);
                    circulo.setAttribute('stroke-dashoffset', offset);
                }
                if (SendaEstado.segundosRestantes <= 0) {
                    clearInterval(SendaEstado.timerInterval);
                    SendaEstado.timerInterval = null;
                    if (btn) {
                        btn.disabled = false;
                        btn.classList.remove('bg-stone-200', 'text-stone-400', 'cursor-not-allowed');
                        btn.classList.add('bg-senda-oliva', 'hover:bg-opacity-95', 'text-white', 'shadow-md');
                        btn.innerText = "Proceder con la Entrega";
                        btn.onclick = () => SendaEstado.irAFase('raah_confesion');

                }
            }, 1000);

                    </div>

                    <div class="text-center space-y-2">

                        <div class="flex items-center justify-between">

        function guardarGratitud(dia) {
            const txt = document.getElementById('texto-yadah');
            if (txt) {
                if (!SendaEstado.datos.registroGratitud) SendaEstado.datos.registroGratitud = {};
                SendaEstado.datos.registroGratitud[dia] = textClean(txt.value);
                SendaEstado.guardar();
                
                const btn = txt.nextElementSibling;
                btn.innerText = "¡Altar Guardado!";
                btn.classList.add('bg-emerald-600');
                btn.classList.remove('bg-senda-tierra');
                setTimeout(() => {
                    btn.innerText = "Actualizar Altar de Gratitud";
                    btn.classList.remove('bg-emerald-600');
                    btn.classList.add('bg-senda-tierra');
                }, 2000);
            }
        }

        function completarDiaActual() {
            const checks = document.querySelectorAll('input[type="checkbox"][id^="check-"]');
            let todasMarcadas = true;
            checks.forEach(c => { if (!c.checked) todasMarcadas = false; });
            
            if (!todasMarcadas) {
                const conf = confirm("Aún no has marcado todas tus veredas de hoy. ¿Deseas completar el día de todos modos? (Recuerda que no hay condenación en Cristo, esto es un ritmo de gracia, no de ley).");
                if (!conf) return;
            }

            if (!SendaEstado.datos.registroDias) SendaEstado.datos.registroDias = {};
            SendaEstado.datos.registroDias[SendaEstado.datos.diaActual] = true;
            
            if (SendaEstado.datos.diaActual % 7 === 0) {
                SendaEstado.datos.faseActual = 'checkpoint_evaluacion';
            } else if (SendaEstado.datos.diaActual < 14) {
                SendaEstado.datos.diaActual++;
            }
            
            SendaEstado.guardar();
            SendaEstado.renderizarFaseActual();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

            return `

                    <div class="p-6 md:p-8 rounded-[2rem] bg-amber-50/50 border border-amber-100 text-left space-y-4 max-w-lg mx-auto shadow-sm">

                        <p class="text-sm text-stone-600 leading-relaxed italic font-light">
                            Así como Jesús se retiraba constantemente a orar, nuestro corazón necesita ser recalibrado para no volver a caer en la autosuficiencia. Vamos a realizar el examen del Templo y del Alma nuevamente para ver las victorias que Cristo ha ganado en ti esta semana.
                        </p>
                    </div>
                    <div class="pt-4 max-w-xs mx-auto">
                        <button onclick="SendaEstado.irAFase('filtro_templo')" class="w-full py-4 bg-senda-oliva hover:bg-opacity-95 text-white font-semibold rounded-2xl shadow-sm transition-all text-base tracking-wide">
                            Iniciar Examen de Estación
                        </button>
                    </div>
                </div>
            `;

        function copiarResultadosCompartir() {
    const perfil = SendaEstado.perfilActivo;
    const sintomas = SendaEstado.datos.sintomasCriticos.map(s => "- " + s.raiz + " (Nivel Severo x" + s.consecutivos + " ciclos)").join('\n');
    const mensaje = `Hola. Estoy usando La Senda Antigua para evaluar mi estado espiritual y físico. La aplicación me ha sugerido buscar acompañamiento y consejo pastoral/médico debido a una fatiga crónica. \n\nPerfil: ${perfil}\nÁreas críticas persistentes:\n${sintomas}\n\n"Confesaos vuestras ofensas unos a otros, y orad unos por otros, para que seáis sanados." (Santiago 5:16)`;
    
    navigator.clipboard.writeText(mensaje).then(() => {
        alert("Resultados copiados al portapapeles. Puedes pegarlos en WhatsApp o un mensaje para tu pastor, mentor o médico.");
    }).catch(err => {
        alert("No se pudo copiar automáticamente. Por favor, toma una captura de pantalla de esta alerta.");
    });
}
